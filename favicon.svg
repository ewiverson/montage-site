<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#0d1117"/>
  <!-- edges from hub to satellite nodes -->
  <g stroke-width="2" fill="none">
    <line x1="32" y1="32" x2="15" y2="16" stroke="#f25c5c" stroke-opacity="0.5"/>
    <line x1="32" y1="32" x2="50" y2="14" stroke="#f2c95c" stroke-opacity="0.5"/>
    <line x1="32" y1="32" x2="54" y2="38" stroke="#7cf25c" stroke-opacity="0.5"/>
    <line x1="32" y1="32" x2="38" y2="54" stroke="#5cf2cf" stroke-opacity="0.5"/>
    <line x1="32" y1="32" x2="12" y2="46" stroke="#5c9cf2" stroke-opacity="0.5"/>
    <line x1="32" y1="32" x2="49" y2="51" stroke="#c95cf2" stroke-opacity="0.5"/>
  </g>
  <!-- satellite nodes -->
  <circle cx="15" cy="16" r="5" fill="#f25c5c"/>
  <circle cx="50" cy="14" r="5" fill="#f2c95c"/>
  <circle cx="54" cy="38" r="5" fill="#7cf25c"/>
  <circle cx="38" cy="54" r="5" fill="#5cf2cf"/>
  <circle cx="12" cy="46" r="5" fill="#5c9cf2"/>
  <circle cx="49" cy="51" r="5" fill="#c95cf2"/>
  <!-- central hub -->
  <circle cx="32" cy="32" r="9" fill="#ffffff" fill-opacity="0.25"/>
  <circle cx="32" cy="32" r="6" fill="#ffffff"/>
</svg>
