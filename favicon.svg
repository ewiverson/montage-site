<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    /* Brighten the defining ring on dark browser chrome so the badge
       never disappears against a dark tab bar. */
    @media (prefers-color-scheme: dark) {
      .ring { stroke: #3d4a5c; }
    }
  </style>

  <!-- Circular badge: ~2px safe-area padding, survives OS circular masking -->
  <circle cx="32" cy="32" r="30" fill="#0d1117"/>
  <circle class="ring" cx="32" cy="32" r="30" fill="none" stroke="#222b36" stroke-width="2"/>

  <!-- Edges hub -> 3 satellites (120deg apart, balanced) -->
  <g stroke-width="2.5" stroke-linecap="round">
    <line x1="32" y1="32" x2="32" y2="16" stroke="#5cc8f2" stroke-opacity="0.6"/>
    <line x1="32" y1="32" x2="18" y2="42" stroke="#c95cf2" stroke-opacity="0.6"/>
    <line x1="32" y1="32" x2="46" y2="42" stroke="#f2b65c" stroke-opacity="0.6"/>
  </g>

  <!-- Satellite nodes: bold, few, distinct hues from the site palette -->
  <circle cx="32" cy="16" r="5" fill="#5cc8f2"/>
  <circle cx="18" cy="42" r="5" fill="#c95cf2"/>
  <circle cx="46" cy="42" r="5" fill="#f2b65c"/>

  <!-- Central hub with soft glow -->
  <circle cx="32" cy="32" r="11" fill="#ffffff" fill-opacity="0.18"/>
  <circle cx="32" cy="32" r="7" fill="#ffffff"/>
</svg>
