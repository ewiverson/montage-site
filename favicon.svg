<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    /* Brighten the defining ring on dark browser chrome so the badge
       never disappears against a dark tab bar. */
    @media (prefers-color-scheme: dark) {
      .ring { stroke: #3d4a5c; }
    }
  </style>

  <!-- Circular badge: safe-area padding, survives OS circular masking -->
  <circle cx="32" cy="32" r="30" fill="#0d1117"/>
  <circle class="ring" cx="32" cy="32" r="30" fill="none" stroke="#222b36" stroke-width="2"/>

  <!-- Edges hub -> 6 satellites (original scattered layout) -->
  <g stroke-width="2" stroke-linecap="round">
    <line x1="32" y1="32" x2="18.4" y2="19.2" stroke="#f25c5c" stroke-opacity="0.5"/>
    <line x1="32" y1="32" x2="46.4" y2="17.6" stroke="#f2c95c" stroke-opacity="0.5"/>
    <line x1="32" y1="32" x2="49.6" y2="36.8" stroke="#7cf25c" stroke-opacity="0.5"/>
    <line x1="32" y1="32" x2="36.8" y2="49.6" stroke="#5cf2cf" stroke-opacity="0.5"/>
    <line x1="32" y1="32" x2="16"   y2="43.2" stroke="#5c9cf2" stroke-opacity="0.5"/>
    <line x1="32" y1="32" x2="45.6" y2="47.2" stroke="#c95cf2" stroke-opacity="0.5"/>
  </g>

  <!-- Satellite nodes, original spectral palette and arrangement -->
  <circle cx="18.4" cy="19.2" r="5" fill="#f25c5c"/>
  <circle cx="46.4" cy="17.6" r="5" fill="#f2c95c"/>
  <circle cx="49.6" cy="36.8" r="5" fill="#7cf25c"/>
  <circle cx="36.8" cy="49.6" r="5" fill="#5cf2cf"/>
  <circle cx="16"   cy="43.2" r="5" fill="#5c9cf2"/>
  <circle cx="45.6" cy="47.2" r="5" fill="#c95cf2"/>

  <!-- Central hub with soft glow (small, as in the original) -->
  <circle cx="32" cy="32" r="9" fill="#ffffff" fill-opacity="0.22"/>
  <circle cx="32" cy="32" r="6" fill="#ffffff"/>
</svg>
