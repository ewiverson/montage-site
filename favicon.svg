<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    /* Brighten the defining ring on dark browser chrome so the badge
       never disappears against a dark tab bar. */
    @media (prefers-color-scheme: dark) {
      .ring { stroke: #3d4a5c; }
    }
  </style>

  <!-- Circular badge: safe-area padding, survives OS circular masking -->
  <circle cx="32" cy="32" r="30" fill="#0d1117"/>
  <circle class="ring" cx="32" cy="32" r="30" fill="none" stroke="#222b36" stroke-width="2"/>

  <!-- Edges hub -> 6 satellites -->
  <g stroke-width="2" stroke-linecap="round">
    <line x1="32" y1="32" x2="32"   y2="15"   stroke="#f25c5c" stroke-opacity="0.55"/>
    <line x1="32" y1="32" x2="46.7" y2="23.5" stroke="#f2c95c" stroke-opacity="0.55"/>
    <line x1="32" y1="32" x2="46.7" y2="40.5" stroke="#7cf25c" stroke-opacity="0.55"/>
    <line x1="32" y1="32" x2="32"   y2="49"   stroke="#5cf2cf" stroke-opacity="0.55"/>
    <line x1="32" y1="32" x2="17.3" y2="40.5" stroke="#5c9cf2" stroke-opacity="0.55"/>
    <line x1="32" y1="32" x2="17.3" y2="23.5" stroke="#c95cf2" stroke-opacity="0.55"/>
  </g>

  <!-- Satellite nodes, spectral palette -->
  <circle cx="32"   cy="15"   r="4.5" fill="#f25c5c"/>
  <circle cx="46.7" cy="23.5" r="4.5" fill="#f2c95c"/>
  <circle cx="46.7" cy="40.5" r="4.5" fill="#7cf25c"/>
  <circle cx="32"   cy="49"   r="4.5" fill="#5cf2cf"/>
  <circle cx="17.3" cy="40.5" r="4.5" fill="#5c9cf2"/>
  <circle cx="17.3" cy="23.5" r="4.5" fill="#c95cf2"/>

  <!-- Central hub with soft glow -->
  <circle cx="32" cy="32" r="10" fill="#ffffff" fill-opacity="0.18"/>
  <circle cx="32" cy="32" r="6.5" fill="#ffffff"/>
</svg>
